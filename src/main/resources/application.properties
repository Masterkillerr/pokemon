# Application
spring.application.name=pokemon-api

# Server
server.port=8080

# PostgreSQL (Supabase)
spring.datasource.url=jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.qwuqwvnvraqeqscdlozd
spring.datasource.password=pokemoncitobonito
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP (connection pool)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Crear esquema 'pokemon' automaticamente
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

# Seed data inicial
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
